<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HCL Color Picker</title>
<style>
  :root {
    --bg: #14151a;
    --panel: #1d1f26;
    --text: #e8e9ee;
    --muted: #9a9ea8;
    --accent: #6c8cff;
    --border: #2c2f38;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
    min-height: 100vh;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin: 0 0 4px;
  }
  p.subtitle {
    color: var(--muted);
    margin: 0 0 24px;
    font-size: 0.9rem;
    text-align: center;
    max-width: 480px;
  }
  .layout {
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
    max-width: 960px;
  }
  .wheel-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .wheel-wrap {
    position: relative;
    width: 360px;
    height: 220px;
    touch-action: none;
    margin-left: 30px;
    margin-bottom: 20px;
  }
  canvas#wheel {
    position: absolute;
    inset: 0;
    cursor: crosshair;
    box-shadow: 0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,0.4);
  }
  .axis-x, .axis-y {
    position: absolute;
    color: var(--muted);
    font-size: 0.65rem;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
  }
  .axis-x {
    top: 100%;
    margin-top: 4px;
    transform: translateX(-50%);
  }
  .axis-y {
    right: 100%;
    margin-right: 6px;
    transform: translateY(-50%);
  }
  .axis-title {
    position: absolute;
    color: var(--muted);
    font-size: 0.7rem;
  }
  .axis-title.x-title {
    top: 100%;
    margin-top: 20px;
    left: 50%;
    transform: translateX(-50%);
  }
  .axis-title.y-title {
    right: 100%;
    margin-right: 24px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    white-space: nowrap;
  }
  .marker {
    position: absolute;
    width: 20px;
    height: 20px;
    margin: -10px 0 0 -10px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px #000, 0 2px 8px rgba(0,0,0,0.6);
    pointer-events: none;
  }
  .field { width: 360px; }
  .field label {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field label span.val {
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
  }

  .controls {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: 340px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .preview {
    height: 90px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .out-of-gamut {
    font-size: 0.75rem;
    color: #ffb84d;
    min-height: 1.1em;
  }
  .values {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
    font-size: 0.82rem;
  }
  .values .k { color: var(--muted); }
  .values .v {
    font-variant-numeric: tabular-nums;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .hex-row { display: flex; gap: 8px; }
  .hex-row input[type=text] {
    flex: 1;
    background: #14151a;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 0.85rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .hex-row button {
    background: var(--accent);
    color: #0d0e12;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .hex-row button:hover { filter: brightness(1.08); }
  .hex-error {
    font-size: 0.75rem;
    color: #ff8080;
    min-height: 1.1em;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #24262f;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.85rem;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<nav style="font-size:0.8rem;color:var(--muted);margin-bottom:10px;"><a href="index.html" style="color:var(--muted);border-bottom:1px dashed var(--border);text-decoration:none;">&larr; Harmony Wheel</a> &nbsp;|&nbsp; HCL Picker</nav>
<h1>HCL Color Picker</h1>
<p class="subtitle">Drag the marker to choose a hue and chroma at the current lightness. The plot only renders colors that fit inside the sRGB gamut &mdash; blank areas are unreachable at that lightness.</p>

<div class="layout">
  <div class="wheel-panel">
    <div class="wheel-wrap" id="wheelWrap">
      <canvas id="wheel" width="360" height="220"></canvas>
      <div id="marker" class="marker"></div>
      <div id="xAxisLabels"></div>
      <div id="yAxisLabels"></div>
      <div class="axis-title x-title">Hue (H&deg;)</div>
      <div class="axis-title y-title">Chroma (C*)</div>
    </div>
    <div class="field">
      <label id="lightLabel">Lightness (L*) <span class="val" id="lightVal">60</span></label>
      <input type="range" id="lightness" min="0" max="100" value="60" step="0.5">
    </div>
    <div class="field">
      <label id="chromaLabel">Chroma (C*) <span class="val" id="chromaVal">40</span></label>
      <input type="range" id="chroma" min="0" max="150" value="40" step="0.5">
    </div>
    <div class="field">
      <label id="hueLabel">Hue (H&deg;) <span class="val" id="hueVal">0</span></label>
      <input type="range" id="hue" min="0" max="359.9" value="0" step="0.1">
    </div>
  </div>

  <div class="controls">
    <div class="preview" id="preview"></div>
    <div class="out-of-gamut" id="gamutWarning"></div>

    <div class="values">
      <div class="k">L*</div><div class="v" id="valL">60.0</div>
      <div class="k">C*</div><div class="v" id="valC">40.0</div>
      <div class="k">H&deg;</div><div class="v" id="valH">0.0</div>
      <div class="k">RGB</div><div class="v" id="valRgb">-</div>
    </div>

    <div class="hex-row">
      <input type="text" id="hexInput" placeholder="#ff6633" maxlength="7">
      <button id="applyHexBtn">Apply</button>
    </div>
    <div class="hex-error" id="hexError"></div>
    <div class="hex-row">
      <input type="text" id="hexOutput" readonly>
      <button id="copyBtn">Copy</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
(function(){
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const wheelWrap = document.getElementById('wheelWrap');
  const marker = document.getElementById('marker');
  const width = 360;
  const height = 220;
  const MAX_CHROMA = 150;

  const state = { L: 60, C: 40, H: 0 };

  // ---- sRGB <-> linear ----
  function srgbToLinear(c) {
    c /= 255;
    return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
  }
  function linearToSrgb(c) {
    return c <= 0.0031308 ? c * 12.92 : 1.055 * Math.pow(c, 1 / 2.4) - 0.055;
  }

  // ---- D65 reference white ----
  const Xn = 0.95047, Yn = 1.0, Zn = 1.08883;

  function rgbToXyz(r, g, b) {
    const R = srgbToLinear(r), G = srgbToLinear(g), B = srgbToLinear(b);
    return [
      0.4124564 * R + 0.3575761 * G + 0.1804375 * B,
      0.2126729 * R + 0.7151522 * G + 0.0721750 * B,
      0.0193339 * R + 0.1191920 * G + 0.9503041 * B
    ];
  }

  function xyzToRgb(x, y, z) {
    const R = 3.2404542 * x - 1.5371385 * y - 0.4985314 * z;
    const G = -0.9692660 * x + 1.8760108 * y + 0.0415560 * z;
    const B = 0.0556434 * x - 0.2040259 * y + 1.0572252 * z;
    return [R, G, B].map(linearToSrgb);
  }

  const DELTA = 6 / 29;
  function fLab(t) {
    return t > DELTA ** 3 ? Math.cbrt(t) : t / (3 * DELTA ** 2) + 4 / 29;
  }
  function fLabInv(t) {
    return t > DELTA ? t ** 3 : 3 * DELTA ** 2 * (t - 4 / 29);
  }

  function xyzToLab(x, y, z) {
    const fx = fLab(x / Xn), fy = fLab(y / Yn), fz = fLab(z / Zn);
    return [116 * fy - 16, 500 * (fx - fy), 200 * (fy - fz)];
  }

  function labToXyz(L, a, b) {
    const fy = (L + 16) / 116;
    const fx = fy + a / 500;
    const fz = fy - b / 200;
    return [Xn * fLabInv(fx), Yn * fLabInv(fy), Zn * fLabInv(fz)];
  }

  function labToLch(L, a, b) {
    const C = Math.sqrt(a * a + b * b);
    let H = Math.atan2(b, a) * 180 / Math.PI;
    if (H < 0) H += 360;
    return [L, C, H];
  }

  function lchToLab(L, C, H) {
    const rad = H * Math.PI / 180;
    return [L, C * Math.cos(rad), C * Math.sin(rad)];
  }

  function rgbToLch(r, g, b) {
    const [x, y, z] = rgbToXyz(r, g, b);
    const [L, a, bb] = xyzToLab(x, y, z);
    return labToLch(L, a, bb);
  }

  // returns { rgb: [r,g,b] (clamped 0-255), inGamut: bool }
  function lchToRgb(L, C, H) {
    const [Lx, a, b] = lchToLab(L, C, H);
    const [x, y, z] = labToXyz(Lx, a, b);
    const [r, g, bch] = xyzToRgb(x, y, z);
    const EPS = 1e-3;
    const inGamut = r >= -EPS && r <= 1 + EPS && g >= -EPS && g <= 1 + EPS && bch >= -EPS && bch <= 1 + EPS;
    const clamp = v => Math.round(Math.min(1, Math.max(0, v)) * 255);
    return { rgb: [clamp(r), clamp(g), clamp(bch)], inGamut };
  }

  function rgbToHex([r, g, b]) {
    return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
  }

  function hexToRgb(hex) {
    hex = hex.trim().replace(/^#/, '');
    if (/^[0-9a-fA-F]{3}$/.test(hex)) hex = hex.split('').map(c => c + c).join('');
    if (!/^[0-9a-fA-F]{6}$/.test(hex)) return null;
    const num = parseInt(hex, 16);
    return [(num >> 16) & 255, (num >> 8) & 255, num & 255];
  }

  // ---- position helpers: x-axis = hue (0-360 left to right), y-axis = chroma (0 at bottom, MAX_CHROMA at top) ----
  function hcToXY(H, C) {
    const x = (H / 360) * width;
    const y = height - (C / MAX_CHROMA) * height;
    return [x, y];
  }

  function xyToHC(x, y) {
    const clampedX = Math.min(width, Math.max(0, x));
    const clampedY = Math.min(height, Math.max(0, y));
    const H = (clampedX / width) * 360;
    const C = ((height - clampedY) / height) * MAX_CHROMA;
    return [H, C];
  }

  function drawWheel() {
    const img = ctx.createImageData(width, height);
    const data = img.data;
    for (let y = 0; y < height; y++) {
      const C = ((height - y) / height) * MAX_CHROMA;
      for (let x = 0; x < width; x++) {
        const H = (x / width) * 360;
        const idx = (y * width + x) * 4;
        const { rgb, inGamut } = lchToRgb(state.L, C, H);
        if (!inGamut) {
          data[idx + 3] = 0;
          continue;
        }
        data[idx] = rgb[0];
        data[idx + 1] = rgb[1];
        data[idx + 2] = rgb[2];
        data[idx + 3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
  }

  function renderMarker() {
    const [x, y] = hcToXY(state.H, state.C);
    marker.style.left = x + 'px';
    marker.style.top = y + 'px';
  }

  function renderAxisLabels() {
    const xEl = document.getElementById('xAxisLabels');
    const yEl = document.getElementById('yAxisLabels');
    xEl.innerHTML = '';
    yEl.innerHTML = '';
    [0, 90, 180, 270, 360].forEach(h => {
      const el = document.createElement('div');
      el.className = 'axis-x';
      el.style.left = (h / 360) * width + 'px';
      el.textContent = h;
      xEl.appendChild(el);
    });
    [0, 50, 100, 150].forEach(c => {
      if (c > MAX_CHROMA) return;
      const el = document.createElement('div');
      el.className = 'axis-y';
      el.style.top = (height - (c / MAX_CHROMA) * height) + 'px';
      el.textContent = c;
      yEl.appendChild(el);
    });
  }

  function renderOutputs() {
    const { rgb, inGamut } = lchToRgb(state.L, state.C, state.H);
    const hex = rgbToHex(rgb);
    document.getElementById('preview').style.background = hex;
    document.getElementById('hexOutput').value = hex;
    document.getElementById('valL').textContent = state.L.toFixed(1);
    document.getElementById('valC').textContent = state.C.toFixed(1);
    document.getElementById('valH').textContent = state.H.toFixed(1);
    document.getElementById('valRgb').textContent = rgb.join(', ');
    document.getElementById('gamutWarning').textContent = inGamut ? '' : 'Out of sRGB gamut — shown color is clipped';
  }

  function syncSliders() {
    document.getElementById('lightness').value = state.L;
    document.getElementById('chroma').value = state.C;
    document.getElementById('hue').value = state.H;
    document.getElementById('lightVal').textContent = state.L.toFixed(1);
    document.getElementById('chromaVal').textContent = state.C.toFixed(1);
    document.getElementById('hueVal').textContent = state.H.toFixed(1);
  }

  function renderAll() {
    renderMarker();
    renderOutputs();
  }

  function setL(L) {
    state.L = Math.min(100, Math.max(0, L));
    syncSliders();
    drawWheel();
    renderAll();
  }
  function setC(C) {
    state.C = Math.min(MAX_CHROMA, Math.max(0, C));
    syncSliders();
    renderAll();
  }
  function setH(H) {
    state.H = ((H % 360) + 360) % 360;
    syncSliders();
    renderAll();
  }

  document.getElementById('lightness').addEventListener('input', e => setL(Number(e.target.value)));
  document.getElementById('chroma').addEventListener('input', e => setC(Number(e.target.value)));
  document.getElementById('hue').addEventListener('input', e => setH(Number(e.target.value)));

  // ---- dragging on the wheel ----
  let dragging = false;
  function setFromPointer(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = width / rect.width;
    const scaleY = height / rect.height;
    const x = (clientX - rect.left) * scaleX;
    const y = (clientY - rect.top) * scaleY;
    const [H, C] = xyToHC(x, y);
    state.H = H;
    state.C = C;
    syncSliders();
    renderAll();
  }
  function pointerDown(e) {
    const p = e.touches ? e.touches[0] : e;
    dragging = true;
    setFromPointer(p.clientX, p.clientY);
    e.preventDefault();
  }
  function pointerMove(e) {
    if (!dragging) return;
    const p = e.touches ? e.touches[0] : e;
    setFromPointer(p.clientX, p.clientY);
    e.preventDefault();
  }
  function pointerUp() { dragging = false; }

  wheelWrap.addEventListener('mousedown', pointerDown);
  window.addEventListener('mousemove', pointerMove);
  window.addEventListener('mouseup', pointerUp);
  wheelWrap.addEventListener('touchstart', pointerDown, { passive: false });
  window.addEventListener('touchmove', pointerMove, { passive: false });
  window.addEventListener('touchend', pointerUp);

  // ---- hex input ----
  const hexInput = document.getElementById('hexInput');
  const hexError = document.getElementById('hexError');
  function applyHex() {
    const rgb = hexToRgb(hexInput.value);
    if (!rgb) {
      hexError.textContent = 'Enter a valid hex code, e.g. #ff6633';
      return;
    }
    hexError.textContent = '';
    const [L, C, H] = rgbToLch(...rgb);
    state.L = L;
    state.C = C;
    state.H = H;
    syncSliders();
    drawWheel();
    renderAll();
  }
  document.getElementById('applyHexBtn').addEventListener('click', applyHex);
  hexInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyHex(); });

  // ---- copy hex ----
  function copyToClipboard(text) {
    navigator.clipboard?.writeText(text).catch(() => {});
    const toast = document.getElementById('toast');
    toast.textContent = `Copied ${text}`;
    toast.classList.add('show');
    clearTimeout(copyToClipboard._t);
    copyToClipboard._t = setTimeout(() => toast.classList.remove('show'), 1200);
  }
  document.getElementById('copyBtn').addEventListener('click', () => {
    copyToClipboard(document.getElementById('hexOutput').value);
  });

  // ---- init ----
  syncSliders();
  renderAxisLabels();
  drawWheel();
  renderAll();
})();
</script>
</body>
</html>
